<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .glow-btn {
            width: 200px;
            padding: 12px;
            margin: 10px 0;
            font-size: 16px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(45deg, #8e2de2, #4a00e0);
            color: white;
            cursor: pointer;
            transition: 0.5s ease;
        }

        .glow-btn1 {
            width: 200px;
            padding: 12px;
            margin: 10px 0;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, #e22d2d, #4a00e0);
            color: white;
            cursor: pointer;
            transition: 0.5s ease;
            position: absolute;
            top: 10px;
            right: 20px;
        }

        .glow-btn:hover {
            transform: scale(1.06);
            box-shadow:
                0 0 18px rgba(165, 90, 255, 0.9),
                0 0 28px rgba(130, 60, 255, 0.7);
        }

        .glow-btn1:hover {
            transform: scale(1.06);
            box-shadow:
                0 0 18px rgba(165, 90, 255, 0.9),
                0 0 28px rgba(130, 60, 255, 0.7);
        }

        .free {
            background-color: #0b0124;
            text-align: left;
            position: relative;
        }
        .carousel {
        width: 100%;
        height: 100%;
        position: absolute;
        transform-style: preserve-3d;
        transition: transform 1s ease;
        top: 50px;
        right:-300px;
    }

    .item {
        width: 500px;
        height: 400px;
        background-size: cover;
        background-position: center;
        border-radius: 20px;
        position: absolute;
        left: 50%;
        top: 40%;
        transform-style: preserve-3d;
        transform-origin: center center -500px;
        transition: all 1.6s cubic-bezier(0.25, 0.1, 0.25, 1);
        box-shadow:
               0 0 18px rgba(157, 14, 162, 0.9),
               0 0 28px rgb(206, 7, 120);
    }

    .controls {
        position: absolute;
        bottom: -70px;
        width: 100%;
        text-align: center;
    }
    .btn-box{
        padding: 10px 25px;
        margin: 0 10px;
        font-size: 18px;
        background: linear-gradient(45deg, #dd09fe, #76077d);
        color: white;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        transition: ease 0.3s;
        text-align: right;
       
    }
    .btn-box:hover {
        transform: scale(1.1);
        box-shadow:
                0 0 18px rgba(157, 14, 162, 0.9),
                0 0 28px rgb(206, 7, 120);
    }
    

        
        
    </style>
</head>
<body class="free">
    <a href="Class1-8.html">

    <button class="glow-btn">Class 1</button><br>
    <button class="glow-btn">Class 2</button><br>

    <button class="glow-btn">Class 4</button><br>
    <button class="glow-btn">Class 5</button><br>
    <button class="glow-btn">Class 6</button><br>
    <button class="glow-btn">Class 7</button><br>
    <button class="glow-btn">Class 8</button><br>
    </a>
    <button class="glow-btn">Class 9</button><br>
    <button class="glow-btn">Class 10</button><br>


    <button class="glow-btn1">Contact No.97772 xxxxx</button><br>

    <div class="carousel-wrapper">
    <div class="carousel" id="carousel">
        <div class="item" style="background-image: url(Memmories.webp)"></div>
        <div class="item" style="background-image:url(memories.jpg)"></div>
        <div class="item" style="background-image:url(memories2.jpg)"></div>
        <div class="item" style="background-image:url(memories3.jpg)"></div>
        <div class="item" style="background-image:url(memories4.jpg)"></div>
        <div class="item" style="background-image:url(memories5.jpg)"></div>
        <div class="item" style="background-image:url(memories6.jpg)"></div>
    </div>



<script>
    const items = document.querySelectorAll(".item");
    let current = 0;
    const total = items.length;

    function updatePositions() {
        const radius = 450; 

        items.forEach((item, i) => {
            const angle = ((i - current) * 18); 
            const rad = angle * Math.PI / 180;

            item.style.transform =
                `translate(-50%, -50%) 
                 rotateY(${angle}deg) 
                 translateZ(${Math.cos(rad) * radius}px)
                 translateX(${Math.sin(rad) * 300}px)
                 scale(${1 - Math.abs(i - current) * 0.15})`;

            item.style.opacity = 1 - Math.abs(i - current) * 0.2;
        });
    }

    function rotate(dir) {
        current = (current + dir + total) % total;
        updatePositions();
    }

    updatePositions();

    
    setInterval(() => {
        rotate(1);   
    }, 2000);

</script>

</body>
</html>
